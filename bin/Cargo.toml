[package]
name            = "{{project-name}}" 
version         = "0.1.0"
edition         = "2024"
authors         = ["{{authors}}"]
description     = "{{project_description}}"

[dependencies]

[dev-dependincies]

[lints.rust]
unsafe_code         = "forbid"
missing_docs        = "warn"
unused_must_use     = "warn"

[lints.clippy]
pedantic        = { level = "warn", priority = -1 }
cargo           = { level = "warn", priority = -1 }
unwrap_used     = "warn"
expect_used     = "warn"
todo            = "warn"

